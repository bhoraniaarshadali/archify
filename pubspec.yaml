name: project_home_decor
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.9
  image_picker: ^1.2.1
  http: ^1.6.0
  path_provider: ^2.1.5
  path: ^1.9.1
  logger: ^2.7.0
  shared_preferences: ^2.5.5
  share_plus: ^12.0.1
  gal: ^2.3.2
  cached_network_image: ^3.4.1
  flutter_image_compress: ^2.4.0
  firebase_core: ^4.6.0
  firebase_remote_config: ^6.3.0
  google_mobile_ads: ^7.0.0
#  firebase_analytics: ^12.1.2
  image: ^4.8.0
  connectivity_plus: ^7.0.0
  url_launcher: ^6.3.2
  package_info_plus: ^9.0.0
  video_player: ^2.11.1
  flutter_local_notifications: ^21.0.0
  workmanager: ^0.9.0+3
  in_app_purchase: ^3.2.3
  sqflite: ^2.4.2
  flutter_markdown: ^0.7.7+1
  intl: ^0.20.2
  flutter_cache_manager: ^3.4.1
  google_fonts: ^8.0.2
  flutter_screenutil: ^5.9.3
  get: ^4.7.3
  purchases_flutter: ^9.15.1
  webview_flutter: ^4.13.1
  shimmer: ^3.0.0
  flutter_secure_storage: ^9.2.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/app_icon.png"
  min_sdk_android: 21 # flutter_launcher_icons requires this to be 21 or higher

flutter:
  uses-material-design: true

  assets:
    - assets/images/styles/interior/
    - assets/images/styles/exterior/
    - assets/images/building_types/
    - assets/videos/
    - assets/data/
    - assets/json/interior_styles.json
